services:
  php-fpm:
    build:
      context: .
      dockerfile: php-fpm.Dockerfile
    container_name: landing-api-php-fpm
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./php-fpm-errors.ini:/usr/local/etc/php/conf.d/99-errors.ini:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: landing-api-nginx
    depends_on:
      - php-fpm
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
